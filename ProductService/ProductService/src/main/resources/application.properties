spring.application.name=product-service

# -----------------------
# Database
# -----------------------
spring.datasource.url=jdbc:mysql://localhost:3306/product_service?serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=duc123
server.port=8091

# Kafka Bootstrap Server
# ===============================
spring.kafka.bootstrap-servers=localhost:9092

# Producer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Additional Properties
spring.kafka.producer.properties.request.timeout.ms=15000
spring.kafka.producer.properties.linger.ms=0
spring.kafka.producer.acks=all

# ===============================
# Kafka Consumer
# ===============================
spring.kafka.consumer.group-id=product-service
spring.kafka.consumer.auto-offset-reset=latest

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# ===============================
# JSON Config
# ===============================
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.use.type.headers=false

# -----------------------
# Naming entity mapping table in SQL
# -----------------------
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# C?u h́nh Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# -----------------------
# Show sql
# -----------------------
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

#Redis
data.redis.host=localhost
data.redis.port=6379

#Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
