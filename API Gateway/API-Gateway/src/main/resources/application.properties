server.port=8282

spring.application.name=api-gateway

# Routes cho gateway
spring.cloud.gateway.routes[0].id=order-service
spring.cloud.gateway.routes[0].uri=lb://order-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/orders/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[1].id=product-service
spring.cloud.gateway.routes[1].uri=lb://product-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/products/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[2].id=promotion-service
spring.cloud.gateway.routes[2].uri=lb://promotion-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/promotions/**
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=1

# Logging
logging.level.root=info

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

#JWT
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/vti-dtn-2508
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8080/realms/vti-dtn-2508/protocol/openid-connect/certs